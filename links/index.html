    <style>
        :root {
            --bg-main: #0A0A0B;
            --bg-secondary: #121214;
            --fox-orange: #f60e5a;
            --fox-orange-glow: rgba(246, 14, 90, 0.4);
            --text-primary: #E0E0E0;
            --white: #FFFFFF;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
            perspective: 1000px; /* Base para efeito 3D */
        }

        /* Malha Espacial Dinâmica (Grid 3D) */
        .grid-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grid-background {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-size: 60px 60px;
            background-image: 
                linear-gradient(to right, rgba(246, 14, 90, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(246, 14, 90, 0.15) 1px, transparent 1px);
            transform: rotateX(60deg);
            animation: gridMove 4s linear infinite;
            mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%);
            -webkit-mask-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), black 0%, transparent 50%);
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 60px; }
        }

        /* Canvas Interativo */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Background Glows */
        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--fox-orange-glow);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.5;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; }

        .profile-container {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
            z-index: 10;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--white);
            text-decoration: none;
            letter-spacing: 4px;
            margin-bottom: 10px;
            display: block;
        }

        .logo span { color: var(--fox-orange); }

        .links-wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeInUp 1s ease-out;
            z-index: 10;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            background: rgba(246, 14, 90, 0.1);
            border-color: var(--fox-orange);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(246, 14, 90, 0.2);
        }

        .link-card i {
            width: 20px;
            color: var(--fox-orange);
            transition: var(--transition);
        }

        .link-card:hover i {
            transform: scale(1.2);
            color: var(--white);
        }

        .link-text {
            flex: 1;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Destaque para o WhatsApp */
        .link-card.featured {
            background: var(--fox-orange);
            border-color: var(--fox-orange);
            box-shadow: 0 4px 15px rgba(246, 14, 90, 0.4);
        }
        .link-card.featured .link-text, 
        .link-card.featured i {
            color: var(--white);
        }
        .link-card.featured:hover {
            background: #d40c4e;
            transform: scale(1.02);
        }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.7rem;
            opacity: 0.5;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .logo { font-size: 1.7rem; }
            .link-card { padding: 16px 20px; }
        }
    </style>

<body>

    <script>
        lucide.createIcons();

        // --- Grid Interaction ---
        const gridBg = document.getElementById('grid-bg');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            gridBg.style.setProperty('--mouse-x', `${x}%`);
            gridBg.style.setProperty('--mouse-y', `${y}%`);
        });

        window.addEventListener('touchmove', (e) => {
            const x = (e.touches[0].clientX / window.innerWidth) * 100;
            const y = (e.touches[0].clientY / window.innerHeight) * 100;
            gridBg.style.setProperty('--mouse-x', `${x}%`);
            gridBg.style.setProperty('--mouse-y', `${y}%`);
        });

        // --- Interactive Particles Script ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = Math.random() * 2 + 1;
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                let directionX = (Math.random() * 0.4) - 0.2;
                let directionY = (Math.random() * 0.4) - 0.2;
                let color = Math.random() > 0.5 ? '#f60e5a' : '#ffffff';
                particles.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        class Particle {
            constructor(x, y, dx, dy, size, color) {
                this.x = x; this.y = y; this.dx = dx; this.dy = dy;
                this.size = size; this.color = color;
                this.baseX = this.x; this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                this.x += this.dx;
                this.y += this.dy;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius) {
                    const forceDirectionX = dx / distance;
                    const forceDirectionY = dy / distance;
                    const force = (mouse.radius - distance) / mouse.radius;
                    const directionX = forceDirectionX * force * this.density;
                    const directionY = forceDirectionY * force * this.density;
                    this.x -= directionX;
                    this.y -= directionY;
                }
                this.draw();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
