<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comando Fox | Gerenciamento de Elite</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;600;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.1">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; }
        .admin-container { padding: 120px 5% 60px; max-width: 1400px; margin: 0 auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .admin-header h1 { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; }
        .admin-header h1 span { color: var(--fox-orange); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--bg-secondary); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px; text-align: left; }
        .stat-card h3 { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; font-family: 'Orbitron'; color: var(--fox-orange); font-weight: 900; }

        .user-table-wrapper { background: var(--bg-secondary); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255,255,255,0.03); padding: 20px; font-family: 'Orbitron'; font-size: 0.75rem; color: var(--text-secondary); border-bottom: 1px solid var(--glass-border); }
        td { padding: 20px; border-bottom: 1px solid var(--glass-border); font-size: 0.9rem; color: #fff; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge-status { padding: 4px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .badge-client { background: rgba(0, 242, 255, 0.1); color: #00f2ff; }
        
        #access-denied { display: none; text-align: center; padding: 100px 5%; }
        #admin-content { display: none; }
    </style>
</head>
<body>

    <!-- Acesso Negado -->
    <div id="access-denied">
        <i data-lucide="shield-alert" size="64" style="color: var(--fox-orange); margin-bottom: 20px;"></i>
        <h2 style="font-family: 'Orbitron'; margin-bottom: 15px;">ACESSO RESTRITO</h2>
        <p style="color: var(--text-secondary);">Esta área é exclusiva para o Comando Fox Design.</p>
        <div style="display:flex; gap: 15px; justify-content: center; margin-top: 30px;">
            <button onclick="openAuthModal()" class="btn btn-primary">Fazer Login Admin</button>
            <a href="index.html" class="btn btn-secondary">Voltar para Início</a>
        </div>
    </div>

    <!-- Login Modal Overlay (Copiado da Home para consistência) -->
    <div id="authModal" class="modal-overlay">
        <div class="modal-content glass-effect">
            <button class="modal-close" id="closeAuthModal">&times;</button>
            <div class="auth-box">
                <div class="auth-header">
                    <h2 id="authTitle">Comando <span>Fox Design</span></h2>
                    <p id="authSubtitle">Identifique-se para acessar o painel.</p>
                </div>
                
                <form id="authForm" class="auth-form">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="email" id="authEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="input-group" id="passwordGroup">
                        <label>Senha</label>
                        <input type="password" id="authPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" id="authSubmitBtn" class="btn btn-primary btn-full">Entrar no Comando</button>
                </form>

                <div class="auth-divider">
                    <span>ou</span>
                </div>

                <button id="googleLoginBtn" class="btn btn-google btn-full">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                    Entrar com Google Admin
                </button>
            </div>
        </div>
    </div>

    <!-- Conteúdo Admin -->
    <div id="admin-content" class="admin-container">
        <header class="admin-header">
            <h1>Painel de <span>Controle Fox</span></h1>
            <div style="display: flex; gap: 15px;">
                <button onclick="window.location.href='index.html'" class="btn btn-secondary" style="padding: 10px 20px; font-size: 0.8rem;">Site Oficial</button>
                <button onclick="supabaseClient.auth.signOut().then(() => window.location.reload())" class="btn btn-primary" style="padding: 10px 20px; font-size: 0.8rem;">Sair</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total de Usuários</h3>
                <div id="totalUsers" class="value">0</div>
            </div>
            <div class="stat-card">
                <h3>Vendas Ativas</h3>
                <div id="totalOrders" class="value">0</div>
            </div>
            <div class="stat-card">
                <h3>Leads do Mês</h3>
                <div class="value">--</div>
            </div>
        </div>

        <div class="user-table-wrapper">
            <table id="userTable">
                <thead>
                    <tr>
                        <th>USUÁRIO</th>
                        <th>WHATSAPP</th>
                        <th>INSTAGRAM</th>
                        <th>CADASTRO</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="userListBody">
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="fox-core.js?v=3.1"></script>
    <script>
        const ADMIN_EMAILS = ['foxdeesignn@gmail.com', 'tsobralpbmk1@gmail.com'];

        async function initAdmin() {
            if (!supabaseClient) return;

            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('access-denied').style.display = 'block';
                return;
            }

            document.getElementById('admin-content').style.display = 'block';
            loadAdminData();
        }

        async function loadAdminData() {
            try {
                // 1. Carregar Perfis (Usuários que preencheram os dados)
                const { data: profiles, error: pError } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('updated_at', { ascending: false });

                if (pError) throw pError;

                const listBody = document.getElementById('userListBody');
                document.getElementById('totalUsers').innerText = profiles.length;
                listBody.innerHTML = '';

                profiles.forEach(profile => {
                    const row = document.createElement('tr');
                    const date = new Date(profile.updated_at).toLocaleDateString('pt-BR');
                    
                    row.innerHTML = `
                        <td>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <img src="${profile.avatar_url || 'https://www.gravatar.com/avatar/?d=mp'}" style="width:30px; height:30px; border-radius:50%; object-fit:cover;">
                                <div>
                                    <div style="font-weight:700;">${profile.full_name || 'Usuário Fox'}</div>
                                    <div style="font-size:0.75rem; color:var(--text-secondary);">${profile.id.substring(0,8)}...</div>
                                </div>
                            </div>
                        </td>
                        <td>${profile.phone || '--'}</td>
                        <td>${profile.instagram || '--'}</td>
                        <td>${date}</td>
                        <td><span class="badge-status badge-client">Ativo</span></td>
                    `;
                    listBody.appendChild(row);
                });

                // 2. Total de Pedidos
                const { count, error: cError } = await supabaseClient
                    .from('orders')
                    .select('*', { count: 'exact', head: true });
                
                if (!cError) document.getElementById('totalOrders').innerText = count || 0;

                if (typeof lucide !== 'undefined') lucide.createIcons();

            } catch (err) {
                console.error("Erro ao carregar dados admin:", err);
            }
        }

        window.addEventListener('DOMContentLoaded', initAdmin);
    </script>
</body>
</html>
